    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,.55) 75%, rgba(0,0,0,1) 100%);

  @keyframes vignette { 0%,100%{opacity:.7} 50%{opacity:1} }
  nav {

  nav .logo { color: var(--ink); text-decoration: none; font-family: var(--font-mono); font-size: 13px; opacity: .7; transition: opacity .2s; }
  nav .logo:hover { opacity: 1; }
  nav ul { list-style: none; display: flex; gap: 32px; margin-left: auto; }
  nav ul li a { color: var(--ink-soft); text-decoration: none; transition: color .2s; }
  nav ul li a:hover { color: var(--ink); }
  main {
    position: relative; z-index: 5; flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 48px;
  }
  .wip { text-align: center; max-width: 480px; }
  .wip-code { font-family: var(--font-mono); font-size: 13px; color: var(--ink-dim); margin-bottom: 24px; }
  .wip-code span { color: var(--ink-soft); }
  .wip h1 { font-size: clamp(28px,6vw,44px); font-weight: 400; letter-spacing: -.02em; line-height: 1.15; margin-bottom: 20px; }
  .wip p { color: var(--ink-soft); font-size: 15px; line-height: 1.6; margin-bottom: 40px; }
  .wip a {
    color: var(--ink); text-decoration: none; font-family: var(--font-mono); font-size: 13px;
    border: 1px solid var(--rule); padding: 10px 24px; border-radius: 6px;
    transition: border-color .25s, background .25s; display: inline-block;
  }
  .wip a:hover { border-color: rgba(255,255,255,.3); background: rgba(255,255,255,.04); }
  @media (max-width: 640px) { nav { padding: 20px 24px; } nav ul { gap: 20px; } main { padding: 32px 24px; } }

  /* --- View Transitions API --- */
  ::view-transition {
    background: #000;
  }
  ::view-transition-group(root) {
    background: #000;
  }
  ::view-transition-image-pair(root) {
    background: #000;
    isolation: isolate;
  }
  ::view-transition-old(root),
  ::view-transition-new(root) {
    mix-blend-mode: normal;
  }

  @view-transition { navigation: auto; }
  ::view-transition-old(root) {
    animation: 0.35s ease-out both vt-fade-out;
  }
  ::view-transition-new(root) {
    animation: 0.45s ease-out 0.08s both vt-fade-in;
  }
  @keyframes vt-fade-out {
    to { opacity: 0; transform: scale(0.96); }
  }
  @keyframes vt-fade-in {
    from { opacity: 0; transform: scale(1.04); }
  }
  @media (prefers-reduced-motion: reduce) {
    ::view-transition-old(root),
    ::view-transition-new(root) { animation: none; }
  }
